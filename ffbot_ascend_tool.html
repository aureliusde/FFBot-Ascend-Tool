<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FFBot Ascension Tool</title>
<style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 40px auto; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d4ff; text-align: center; }
    .container { background: #16213e; padding: 30px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,212,255,0.2); }
    label { display: block; margin: 10px 0 5px; font-weight: bold; color: #00d4ff; }
    input, select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: none; background: #0f3460; color: white; font-size: 16px; }
    button { background: #00d4ff; color: #1a1a2e; padding: 14px 30px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    button:hover { background: #00b8e0; }
    .result { background: #0f3460; padding: 25px; border-radius: 10px; margin-top: 30px; display: none; }
    .result.show { display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; text-align: center; border: 1px solid #334155; }
    th { background: #0f3460; }
    .green { background: #14532d; color: #4ade80; }
    .yellow { background: #78350f; color: #fcd34d; }
    .red { background: #7f1d1d; color: #f87171; }
</style>
</head>
<body>
<div class="container">
    <h1>FFBot Ascension Tool</h1>

    <div class="section">
        <label>Current NG+</label>
        <input type="number" id="ng" value="40" min="0">

        <label>Role</label>
        <select id="role">
            <option value="dd">Damage Dealer (DD)</option>
            <option value="tank">Tank</option>
            <option value="healer">Healer</option>
        </select>

        <h3>Stats after last Ascension (Base)</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div><label>ATK</label><input type="number" id="base_atk" value="137000"></div>
            <div><label>MAG</label><input type="number" id="base_mag" value="127000"></div>
            <div><label>SPI</label><input type="number" id="base_spi" value="127000"></div>
            <div><label>HP</label><input type="number" id="base_hp" value="331000"></div>
        </div>

        <h3>Current Stats (This Run) - Optional</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div><label>ATK</label><input type="number" id="curr_atk" placeholder="optional"></div>
            <div><label>MAG</label><input type="number" id="curr_mag" placeholder="optional"></div>
            <div><label>SPI</label><input type="number" id="curr_spi" placeholder="optional"></div>
            <div><label>HP</label><input type="number" id="curr_hp" placeholder="optional"></div>
        </div>
    </div>

    <button onclick="calculateTargets()">Calculate Targets & Recommendation</button>

    <div id="result" class="result">
        <h2 style="margin-top:0; color:#00d4ff;">Targets & Recommendation</h2>
        <div id="recommendation"></div>
        
        <table id="targetTable">
            <tr>
                <th>Multiplier</th>
                <th>ATK Target</th>
                <th>HP Target</th>
                <th>Status</th>
            </tr>
        </table>
    </div>
</div>

<script>
// Load saved data
function loadSavedData() {
    const saved = localStorage.getItem('ffbot_last_input');
    if (saved) {
        const data = JSON.parse(saved);
        document.getElementById('ng').value = data.ng || 40;
        document.getElementById('role').value = data.role || 'dd';
        document.getElementById('base_atk').value = data.base_atk || 137000;
        document.getElementById('base_mag').value = data.base_mag || 127000;
        document.getElementById('base_spi').value = data.base_spi || 127000;
        document.getElementById('base_hp').value = data.base_hp || 331000;
    }
}

// Save data
function saveData() {
    const data = {
        ng: document.getElementById('ng').value,
        role: document.getElementById('role').value,
        base_atk: document.getElementById('base_atk').value,
        base_mag: document.getElementById('base_mag').value,
        base_spi: document.getElementById('base_spi').value,
        base_hp: document.getElementById('base_hp').value
    };
    localStorage.setItem('ffbot_last_input', JSON.stringify(data));
}

function calculateTargets() {
    saveData(); // Save input automatically

    const ng = parseInt(document.getElementById('ng').value) || 0;
    const base_atk = parseInt(document.getElementById('base_atk').value) || 1;
    const base_hp = parseInt(document.getElementById('base_hp').value) || 1;

    const curr_atk = parseInt(document.getElementById('curr_atk').value) || 0;
    const curr_hp = parseInt(document.getElementById('curr_hp').value) || 0;

    const hasCurrent = curr_atk > 0 && curr_hp > 0;

    let minMult = ng >= 150 ? 2.4 : ng >= 100 ? 2.2 : ng >= 50 ? 2.0 : 1.8;
    let maxMult = ng >= 150 ? 2.8 : ng >= 100 ? 2.5 : ng >= 50 ? 2.3 : 2.1;

    const targets = {
        "1.8x": { atk: Math.round(base_atk * 1.8), hp: Math.round(base_hp * 1.8) },
        "2.0x": { atk: Math.round(base_atk * 2.0), hp: Math.round(base_hp * 2.0) },
        "2.2x": { atk: Math.round(base_atk * 2.2), hp: Math.round(base_hp * 2.2) },
        "2.3x": { atk: Math.round(base_atk * 2.3), hp: Math.round(base_hp * 2.3) },
        "2.5x": { atk: Math.round(base_atk * 2.5), hp: Math.round(base_hp * 2.5) }
    };

    let html = `<strong>Recommended for NG+${ng}:</strong> ${minMult.toFixed(1)}x – ${maxMult.toFixed(1)}x<br><br>`;

    if (hasCurrent) {
        const mult_atk = (curr_atk / base_atk).toFixed(2);
        const mult_hp = (curr_hp / base_hp).toFixed(2);
        html += `<strong>Current Multiplier:</strong> ${mult_atk}x ATK | ${mult_hp}x HP<br><br>`;
    }

    let tableHTML = `<tr><th>Multiplier</th><th>ATK Target</th><th>HP Target</th><th>Status</th></tr>`;

    Object.keys(targets).forEach(key => {
        const t = targets[key];
        let status = '', color = '';

        const targetVal = parseFloat(key);

        if (hasCurrent) {
            const currentVal = parseFloat((curr_atk / base_atk).toFixed(2));
            if (currentVal >= targetVal + 0.1) { status = '✅ Ideal'; color = 'green'; }
            else if (currentVal >= targetVal - 0.2) { status = '⚠️ Okay'; color = 'yellow'; }
            else { status = '❌ Too early'; color = 'red'; }
        } else {
            if (targetVal >= minMult && targetVal <= maxMult) { status = '✅ Recommended'; color = 'green'; }
            else if (targetVal < minMult) { status = '❌ Too low'; color = 'red'; }
            else { status = '⚠️ Possible'; color = 'yellow'; }
        }

        tableHTML += `<tr class="${color}">
            <td><strong>${key}</strong></td>
            <td>${t.atk.toLocaleString()}</td>
            <td>${t.hp.toLocaleString()}</td>
            <td>${status}</td>
        </tr>`;
    });

    document.getElementById('targetTable').innerHTML = tableHTML;
    document.getElementById('recommendation').innerHTML = html;
    document.getElementById('result').classList.add('show');
}

// Load saved data when page opens
window.onload = () => {
    const saved = localStorage.getItem('ffbot_input');
    if (saved) {
        const d = JSON.parse(saved);
        document.getElementById('ng').value = d.ng || 40;
        document.getElementById('role').value = d.role || 'dd';
        document.getElementById('base_atk').value = d.base_atk || 137000;
        document.getElementById('base_mag').value = d.base_mag || 127000;
        document.getElementById('base_spi').value = d.base_spi || 127000;
        document.getElementById('base_hp').value = d.base_hp || 331000;
    }
};
</script>
</body>
</html>
