<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FFBot Ascension Tool</title>
<style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 40px auto; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d4ff; text-align: center; }
    .container { background: #16213e; padding: 30px; border-radius: 12px; box-shadow: 0 0 20px rgba(0,212,255,0.2); }
    label { display: block; margin: 10px 0 5px; font-weight: bold; color: #00d4ff; }
    input, select { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 6px; border: none; background: #0f3460; color: white; font-size: 16px; }
    button { background: #00d4ff; color: #1a1a2e; padding: 14px 30px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    button:hover { background: #00b8e0; }
    .result { background: #0f3460; padding: 25px; border-radius: 10px; margin-top: 30px; display: none; }
    .result.show { display: block; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { padding: 14px; text-align: center; border: 1px solid #334155; }
    th { background: #0f3460; }
    .green { background: #14532d; color: #4ade80; font-weight: bold; }
    .yellow { background: #78350f; color: #fcd34d; }
    .red { background: #7f1d1d; color: #f87171; }
</style>
</head>
<body>
<div class="container">
    <h1>FFBot Ascension Tool</h1>

    <div class="section">
        <label>Current NG+</label>
        <input type="number" id="ng" value="40" min="0">

        <label>Role</label>
        <select id="role">
            <option value="dd">Damage Dealer (DD)</option>
            <option value="tank">Tank</option>
            <option value="healer">Healer</option>
        </select>

        <h3>Stats after last Ascension (Base)</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div><label>ATK</label><input type="number" id="base_atk" value="137000"></div>
            <div><label>MAG</label><input type="number" id="base_mag" value="127000"></div>
            <div><label>SPI</label><input type="number" id="base_spi" value="127000"></div>
            <div><label>HP</label><input type="number" id="base_hp" value="331000"></div>
        </div>

        <h3>Current Stats (This Run) - Optional</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div><label>ATK</label><input type="number" id="curr_atk" placeholder="optional"></div>
            <div><label>MAG</label><input type="number" id="curr_mag" placeholder="optional"></div>
            <div><label>SPI</label><input type="number" id="curr_spi" placeholder="optional"></div>
            <div><label>HP</label><input type="number" id="curr_hp" placeholder="optional"></div>
        </div>
    </div>

    <button onclick="calculateTargets()">Calculate Targets & Recommendation</button>

    <div id="result" class="result">
        <h2 style="margin-top:0; color:#00d4ff;">Targets & Recommendation</h2>
        <div id="recommendation"></div>
        
        <table id="targetTable"></table>
    </div>
</div>

<script>
function calculateTargets() {
    const ng = parseInt(document.getElementById('ng').value) || 0;
    const base_atk = parseInt(document.getElementById('base_atk').value) || 1;
    const base_hp = parseInt(document.getElementById('base_hp').value) || 1;

    const curr_atk = parseInt(document.getElementById('curr_atk').value) || 0;
    const curr_hp = parseInt(document.getElementById('curr_hp').value) || 0;

    let mult_atk = curr_atk > 0 ? (curr_atk / base_atk).toFixed(2) : null;
    let mult_hp = curr_hp > 0 ? (curr_hp / base_hp).toFixed(2) : null;

    let minMult = ng >= 150 ? 2.4 : ng >= 100 ? 2.2 : ng >= 50 ? 2.0 : 1.8;

    const targets = {
        "1.8x": { mult: 1.8, atk: Math.round(base_atk * 1.8), hp: Math.round(base_hp * 1.8) },
        "2.0x": { mult: 2.0, atk: Math.round(base_atk * 2.0), hp: Math.round(base_hp * 2.0) },
        "2.2x": { mult: 2.2, atk: Math.round(base_atk * 2.2), hp: Math.round(base_hp * 2.2) },
        "2.3x": { mult: 2.3, atk: Math.round(base_atk * 2.3), hp: Math.round(base_hp * 2.3) },
        "2.5x": { mult: 2.5, atk: Math.round(base_atk * 2.5), hp: Math.round(base_hp * 2.5) }
    };

    let html = `<strong>Recommended Multiplier for NG+${ng}:</strong> ${minMult.toFixed(1)}x – 2.5x<br><br>`;

    if (mult_atk) {
        html += `<strong>Current Multiplier:</strong> ${mult_atk}x ATK | ${mult_hp}x HP<br><br>`;
    }

    let tableHTML = `<tr><th>Multiplier</th><th>ATK Target</th><th>HP Target</th><th>Status</th></tr>`;

    Object.keys(targets).forEach(key => {
        const t = targets[key];
        let status = '';
        let colorClass = '';

        if (mult_atk) {
            const current = parseFloat(mult_atk);
            if (current >= t.mult + 0.15) {
                status = '✅ Ideal';
                colorClass = 'green';
            } else if (current >= t.mult - 0.1) {
                status = '⚠️ Okay';
                colorClass = 'yellow';
            } else {
                status = '❌ Too early';
                colorClass = 'red';
            }
        } else {
            // No current stats → only highlight recommended range
            if (t.mult >= minMult && t.mult <= 2.3) {
                status = 'Recommended';
                colorClass = 'green';
            } else if (t.mult < minMult) {
                status = 'Too early';
                colorClass = 'red';
            } else {
                status = 'Strong';
                colorClass = 'yellow';
            }
        }

        tableHTML += `<tr class="${colorClass}">
            <td><strong>${key}</strong></td>
            <td>${t.atk.toLocaleString()}</td>
            <td>${t.hp.toLocaleString()}</td>
            <td>${status}</td>
        </tr>`;
    });

    document.getElementById('targetTable').innerHTML = tableHTML;
    document.getElementById('recommendation').innerHTML = html;
    document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
